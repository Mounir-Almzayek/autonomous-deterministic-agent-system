# ADAS – API + Dashboard
# Run: docker compose up --build
# API: http://localhost:8000  |  Dashboard: http://localhost:8501

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: adas-api:latest
    container_name: adas-api
    ports:
      - "8000:8000"
    environment:
      - ADAS_JSON_LOGS=0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: adas-api:latest
    container_name: adas-dashboard
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8501:8501"
    environment:
      - ADAS_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
